{% extends "base.html" %}
{% block title %}Payment Failed — AIContent{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto py-20 px-4 text-center">
  <div class="bg-white rounded-2xl border border-red-200 p-12">
    <div class="text-5xl mb-6">❌</div>
    <h1 class="text-2xl font-bold text-red-700 mb-4">Payment Failed</h1>
    <p class="text-gray-600 mb-8">
      We could not process your payment. Please try again or contact support.
    </p>
    <a href="{% url 'billing:billing_page' %}"
       class="inline-block px-8 py-3 bg-red-600 text-white rounded-xl font-bold hover:bg-red-700">
      Try Again
    </a>
  </div>
</div>
{% endblock %}
