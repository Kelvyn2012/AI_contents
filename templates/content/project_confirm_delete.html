{% extends "base.html" %}
{% block title %}Delete Project — AIContent{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto py-16 px-4 text-center">
  <div class="bg-white rounded-2xl border border-red-200 p-10">
    <h1 class="text-2xl font-bold mb-4 text-red-600">Delete Project</h1>
    <p class="text-gray-600 mb-8">
      Are you sure you want to delete <strong>"{{ project.name }}"</strong>?
      This will also delete all associated content generations.
    </p>
    <form method="post" class="flex gap-4 justify-center">
      {% csrf_token %}
      <button type="submit" class="px-6 py-3 bg-red-600 text-white rounded-lg font-semibold hover:bg-red-700">
        Yes, delete
      </button>
      <a href="{% url 'content:project_detail' project.pk %}"
         class="px-6 py-3 border border-gray-200 rounded-lg text-gray-600 hover:bg-gray-50">
        Cancel
      </a>
    </form>
  </div>
</div>
{% endblock %}
