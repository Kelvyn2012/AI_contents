<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>{{ generation.get_content_type_display }} — {{ project.name }}</title>
  <style>
    body { font-family: Georgia, serif; font-size: 13pt; line-height: 1.6; color: #1a1a1a; margin: 2cm; }
    h1 { font-size: 22pt; color: #4f46e5; border-bottom: 2px solid #e0e7ff; padding-bottom: 8px; margin-bottom: 16px; }
    .meta { font-size: 10pt; color: #6b7280; margin-bottom: 24px; }
    .content { white-space: pre-wrap; }
    .footer { margin-top: 40px; font-size: 9pt; color: #9ca3af; border-top: 1px solid #e5e7eb; padding-top: 8px; }
  </style>
</head>
<body>
  <h1>{{ generation.get_content_type_display }}</h1>
  <div class="meta">
    Project: {{ project.name }} &bull; Brand: {{ project.brand_name }}<br>
    Generated: {{ generation.created_at|date:"F j, Y" }} &bull; {{ generation.word_count }} words
  </div>
  <div class="content">{{ generation.result_text }}</div>
  <div class="footer">Generated by AIContent &bull; aicontent.app</div>
</body>
</html>
